name: Enrich ETF Data

on:
  schedule:
    # M-F at 11:00 UTC (7am EDT / 6am EST). GitHub may queue cron up to ~15 min late.
    - cron: '0 11 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: enrich-data
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install --upgrade yfinance pandas

      - name: Run enrichment
        run: python scripts/enrich.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.js index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(data): daily refresh $(date -u +%Y-%m-%d)"
          git push
